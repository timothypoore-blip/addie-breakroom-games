<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Sudoku — Addie Break Room</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#081829;
  --blue:#185793;
  --green:#8BC53F;
  --green-dark:#6fa030;
  --white:#ffffff;
  --gray-50:#f8fafc;
  --gray-100:#f1f5f9;
  --gray-200:#e2e8f0;
  --gray-400:#94a3b8;
  --gray-600:#475569;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif;
  background:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 12px 40px;
  position:relative;
  overflow-x:hidden;
}

/* ── FLOW FIELD ── */
#bgCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  z-index:0;pointer-events:none;
}

/* ── LAYOUT ── */
.page{
  position:relative;z-index:1;
  width:100%;max-width:500px;
  display:flex;flex-direction:column;
  align-items:center;gap:12px;
}

/* ── HEADER ── */
.header{text-align:center;padding-top:8px;}
.addie-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.9);
  border:1px solid var(--gray-200);
  border-radius:100px;padding:4px 14px 4px 8px;
  margin-bottom:10px;
  box-shadow:0 2px 10px rgba(8,24,41,0.06);
}
.badge-mark{
  width:24px;height:24px;background:linear-gradient(135deg,var(--blue),var(--green));
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:11px;color:#fff;
}
.badge-text{font-size:0.72rem;font-weight:600;color:var(--navy);}
.badge-text span{color:var(--green-dark);}
h1{font-size:clamp(1.5rem,5vw,2rem);font-weight:900;color:var(--navy);margin-bottom:2px;}
h1 em{color:var(--green);font-style:normal;}
.header-sub{font-size:0.8rem;color:var(--gray-400);}

/* ── MAIN CARD ── */
.game-card{
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(16px);
  border-radius:22px;
  box-shadow:0 6px 32px rgba(8,24,41,0.1);
  border:1px solid rgba(255,255,255,0.9);
  padding:18px;
  width:100%;
}

/* ── TOP BAR ── */
.top-bar{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:8px;margin-bottom:12px;
}
.diff-row{display:flex;gap:5px;}
.diff-btn{
  padding:5px 10px;border-radius:100px;
  border:1.5px solid var(--gray-200);background:#fff;
  color:var(--gray-600);font-size:0.7rem;font-weight:600;
  cursor:pointer;font-family:'Poppins',sans-serif;transition:all .2s;
}
.diff-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.diff-btn:hover:not(.active){border-color:var(--blue);color:var(--blue);}

.stats-center{display:flex;gap:10px;justify-content:center;}
.stat-pill{
  background:var(--gray-50);border:1.5px solid var(--gray-200);
  border-radius:100px;padding:5px 12px;text-align:center;
  transition:all .3s;
}
.stat-pill.warn{background:rgba(220,38,38,0.07);border-color:#dc2626;}
.stat-pill.good{background:rgba(139,197,63,0.1);border-color:var(--green);}
.stat-label{font-size:0.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-400);display:block;line-height:1;}
.stat-value{font-size:0.95rem;font-weight:800;color:var(--navy);line-height:1.2;display:block;}
.stat-value.red{color:#dc2626;}

.top-right{display:flex;justify-content:flex-end;gap:6px;}
.icon-btn{
  width:32px;height:32px;border-radius:8px;
  border:1.5px solid var(--gray-200);background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;transition:all .2s;
  font-family:'Poppins',sans-serif;
}
.icon-btn:hover{border-color:var(--blue);background:rgba(24,87,147,0.05);}
.icon-btn.active{background:rgba(139,197,63,0.12);border-color:var(--green);}

/* ── DISAPPEAR WARNING BAR ── */
.warn-bar{
  background:rgba(251,191,36,0.15);
  border:1.5px solid rgba(251,191,36,0.4);
  border-radius:10px;
  padding:7px 12px;
  font-size:0.75rem;font-weight:600;color:#92400e;
  display:flex;align-items:center;gap:7px;
  margin-bottom:10px;
  animation:warnPulse 1s infinite;
  display:none;
}
@keyframes warnPulse{0%,100%{opacity:1;}50%{opacity:.7;}}

/* ── BOARD ── */
.board-wrap{
  position:relative;width:100%;
  max-width:450px;margin:0 auto 12px;
}
#sudoku-board{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  width:100%;
  aspect-ratio:1;
  background:var(--navy);
  border:3px solid var(--navy);
  border-radius:10px;
  overflow:hidden;
  gap:1px;
}
.cell{
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(0.9rem,2.5vw,1.25rem);
  font-weight:700;
  cursor:pointer;
  position:relative;
  transition:background .12s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  color:var(--navy);
}

/* 3×3 box borders */
.cell[data-col="2"],.cell[data-col="5"]{border-right:2.5px solid var(--navy);}
.cell[data-row="2"],.cell[data-row="5"]{border-bottom:2.5px solid var(--navy);}

/* States */
.cell.given{background:var(--gray-50);color:var(--navy);font-weight:800;}
.cell.selected{background:#f4fce8!important;box-shadow:inset 0 0 0 2px var(--green)!important;}
.cell.peer{background:#fafef8;}
.cell.same-num{background:#eefad4;}
.cell.correct{color:var(--green-dark);}
.cell.incorrect{color:#dc2626;animation:cellShake .35s ease-in-out;}
.cell.given.selected{background:#f4fce8!important;box-shadow:inset 0 0 0 2px var(--green)!important;}
.cell.disappearing{animation:cellFadeOut .6s forwards;}
.cell.warn-flash{animation:warnFlash .5s 3;}

@keyframes cellShake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-4px);}
  75%{transform:translateX(4px);}
}
@keyframes cellFadeOut{
  0%{background:rgba(251,191,36,0.4);opacity:1;}
  50%{background:rgba(251,191,36,0.2);}
  100%{background:#fff;opacity:1;}
}
@keyframes warnFlash{
  0%,100%{background:rgba(251,191,36,0.1);}
  50%{background:rgba(251,191,36,0.4);}
}

/* Notes mode */
.cell .notes-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  width:100%;height:100%;padding:1px;
  position:absolute;inset:0;
}
.note-num{
  font-size:clamp(0.32rem,0.9vw,0.44rem);
  font-weight:600;color:var(--blue);
  display:flex;align-items:center;justify-content:center;
  opacity:0.9;
}

/* ── NUMBER PAD ── */
.num-pad{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:5px;
  margin-bottom:10px;
}
.num-btn{
  aspect-ratio:1;border-radius:10px;
  border:1.5px solid var(--gray-200);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-size:clamp(0.85rem,2.5vw,1.15rem);font-weight:700;
  color:var(--navy);cursor:pointer;transition:all .15s;
}
.num-btn:hover{background:rgba(24,87,147,0.07);border-color:var(--blue);}
.num-btn:active{transform:scale(0.93);}
.num-btn.remaining-0{opacity:.3;pointer-events:none;}

/* ── ACTION ROW ── */
.action-row{
  display:flex;gap:8px;align-items:center;margin-bottom:4px;
}
.act-btn{
  flex:1;padding:10px 8px;border-radius:12px;
  border:1.5px solid var(--gray-200);background:#fff;
  font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;
  color:var(--gray-600);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.act-btn:hover{border-color:var(--blue);color:var(--blue);}
.act-btn.notes-on{background:rgba(139,197,63,0.1);border-color:var(--green);color:var(--green-dark);}
.act-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.act-btn.primary:hover{background:var(--blue);border-color:var(--blue);}
.hint-count{
  background:rgba(139,197,63,0.2);color:var(--green-dark);
  border-radius:100px;padding:1px 6px;font-size:0.65rem;font-weight:700;
}

/* ── GAME MESSAGE ── */
.game-msg{
  min-height:32px;text-align:center;font-size:0.9rem;
  font-weight:700;display:flex;align-items:center;justify-content:center;
  gap:8px;border-radius:12px;padding:6px 16px;
  transition:all .3s;
}
.game-msg.win{background:rgba(139,197,63,0.12);color:var(--green-dark);border:1.5px solid var(--green);}
.game-msg.lose{background:rgba(220,38,38,0.07);color:#dc2626;border:1.5px solid #dc2626;}

/* ── HEARTS ── */
.hearts{display:flex;gap:4px;align-items:center;}
.heart{font-size:1rem;transition:all .3s;}
.heart.lost{opacity:.2;filter:grayscale(1);}

/* ── NEXT DISAPPEAR INDICATOR ── */
.disappear-track{
  height:4px;background:var(--gray-100);border-radius:100px;overflow:hidden;
  margin-bottom:8px;
}
.disappear-fill{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--green),#f59e0b);
  transition:width .5s linear;
}

/* ── COMPLETION OVERLAY ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(8,24,41,0.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.show{opacity:1;pointer-events:all;}
.overlay-card{
  background:#fff;border-radius:24px;padding:32px 28px;
  max-width:360px;width:100%;text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.3);
  transform:scale(.9);transition:transform .3s;
}
.overlay.show .overlay-card{transform:scale(1);}
.overlay-emoji{font-size:3.5rem;margin-bottom:8px;}
.overlay-title{font-size:1.4rem;font-weight:900;color:var(--navy);margin-bottom:6px;}
.overlay-sub{font-size:0.88rem;color:var(--gray-600);margin-bottom:20px;line-height:1.5;}
.overlay-stats{
  display:flex;gap:10px;justify-content:center;margin-bottom:20px;
}
.ov-stat{
  background:var(--gray-50);border:1.5px solid var(--gray-200);
  border-radius:12px;padding:10px 14px;
}
.ov-stat-val{font-size:1.3rem;font-weight:900;color:var(--navy);}
.ov-stat-lbl{font-size:0.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-400);}
.ov-btn{
  width:100%;padding:13px;border-radius:13px;border:none;
  font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.ov-btn-primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;margin-bottom:8px;}
.ov-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(8,24,41,0.2);}
.ov-btn-sec{background:var(--gray-100);color:var(--gray-600);}
.pb-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(139,197,63,0.12);border:1.5px solid var(--green);
  border-radius:100px;padding:4px 14px;margin-bottom:12px;
  font-size:0.78rem;font-weight:700;color:var(--green-dark);
}

@media(max-width:380px){
  .game-card{padding:12px;}
  .num-pad{gap:3px;}
  .action-row{gap:5px;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="addie-badge">
      <div class="badge-mark">A</div>
      <span class="badge-text">addie<span> Break Room</span></span>
    </div>
    <h1>🔢 <em>Sudoku</em></h1>
    <p class="header-sub">Numbers vanish. Prior auths get denied. Stay sharp.</p>
  </div>

  <!-- MAIN CARD -->
  <div class="game-card">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="diff-row">
        <button class="diff-btn active" data-diff="easy">Easy</button>
        <button class="diff-btn" data-diff="medium">Med</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
      <div class="stats-center">
        <div class="stat-pill" id="timerPill">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timerVal">0:00</span>
        </div>
        <div class="stat-pill" id="mistakePill">
          <span class="stat-label">Mistakes</span>
          <div class="hearts" id="hearts">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
          </div>
        </div>
      </div>
      <div class="top-right">
        <button class="icon-btn" id="undoBtn" title="Undo">↩</button>
        <button class="icon-btn" id="newBtn" title="New game">⟳</button>
      </div>
    </div>

    <!-- DISAPPEAR PROGRESS BAR -->
    <div class="disappear-track"><div class="disappear-fill" id="disappearFill" style="width:100%"></div></div>

    <!-- WARN BAR -->
    <div class="warn-bar" id="warnBar">⚠️ Numbers are about to vanish — a cell will disappear!</div>

    <!-- BOARD -->
    <div class="board-wrap">
      <div id="sudoku-board"></div>
    </div>

    <!-- NUMBER PAD -->
    <div class="num-pad" id="numPad">
      <button class="num-btn" data-n="1">1</button>
      <button class="num-btn" data-n="2">2</button>
      <button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button>
      <button class="num-btn" data-n="5">5</button>
      <button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button>
      <button class="num-btn" data-n="8">8</button>
      <button class="num-btn" data-n="9">9</button>
    </div>

    <!-- ACTION ROW -->
    <div class="action-row">
      <button class="act-btn" id="eraseBtn">✕ Erase</button>
      <button class="act-btn" id="notesBtn">✏️ Notes</button>
      <button class="act-btn" id="hintBtn">💡 Hint <span class="hint-count" id="hintCount">3</span></button>
      <button class="act-btn primary" id="restartBtn">New Game</button>
    </div>

    <!-- GAME MESSAGE -->
    <div class="game-msg" id="gameMsg"></div>

  </div><!-- /game-card -->
</div><!-- /page -->

<!-- COMPLETION OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-emoji" id="ovEmoji"></div>
    <div class="overlay-title" id="ovTitle"></div>
    <div class="overlay-sub" id="ovSub"></div>
    <div class="pb-badge" id="ovPB" style="display:none">🏆 Personal Best!</div>
    <div class="overlay-stats">
      <div class="ov-stat"><div class="ov-stat-val" id="ovTime">-</div><div class="ov-stat-lbl">Time</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ovMistakes">-</div><div class="ov-stat-lbl">Mistakes</div></div>
      <div class="ov-stat"><div class="ov-stat-val" id="ovBest">-</div><div class="ov-stat-lbl">Best Time</div></div>
    </div>
    <button class="ov-btn ov-btn-primary" onclick="startNewGame()">▶ Play Again</button>
    <button class="ov-btn ov-btn-sec" onclick="closeOverlay()">Keep Board</button>
  </div>
</div>

<script>
/* ══════════════════════
   PEP FLOW FIELD BG
══════════════════════ */
(function(){
  var c=document.getElementById('bgCanvas');
  var ctx=c.getContext('2d');
  var W,H,pts=[],mouse={x:-1e4,y:-1e4};
  var PAL=[[139,197,63],[24,87,147],[13,74,138],[111,160,48],[58,127,193],[93,168,50]];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function mkPt(){
    var col=PAL[Math.floor(Math.random()*PAL.length)];
    return{x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,
      r:col[0],g:col[1],b:col[2],age:0,life:Math.random()*200+100};
  }
  for(var i=0;i<500;i++)pts.push(mkPt());
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('mouseleave',function(){mouse.x=-1e4;mouse.y=-1e4;});
  var t=0;
  function loop(){
    requestAnimationFrame(loop);
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(0,0,W,H);
    t+=0.003;
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      var angle=(Math.cos(p.x*0.005)+Math.sin(p.y*0.005))*Math.PI+t;
      p.vx+=Math.cos(angle)*0.22;p.vy+=Math.sin(angle)*0.22;
      var dx=mouse.x-p.x,dy=mouse.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<150){var f=(150-d)/150;p.vx-=dx*f*0.05;p.vy-=dy*f*0.05;}
      p.vx*=0.95;p.vy*=0.95;
      p.x+=p.vx;p.y+=p.vy;
      p.age++;
      if(p.age>p.life){pts[i]=mkPt();continue;}
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      var alpha=(1-Math.abs(p.age/p.life-0.5)*2)*0.55;
      ctx.globalAlpha=alpha;
      ctx.fillStyle='rgb('+p.r+','+p.g+','+p.b+')';
      ctx.fillRect(p.x,p.y,1.5,1.5);
    }
    ctx.globalAlpha=1;
  }
  resize();loop();
})();

/* ══════════════════════
   SUDOKU ENGINE
══════════════════════ */
const DIFF_GIVENS = {easy:38, medium:28, hard:20};
const DISAPPEAR_INTERVAL = 30000; // 30 seconds

let sdBoard=[],sdSolution=[],sdNotes=[],sdGiven=[];
let selectedRow=-1,selectedCol=-1;
let sdMistakes=0,sdTimer=0,sdHints=3;
let sdGameOver=false,sdNotesMode=false;
let timerInt=null,disappearInt=null,disappearCountdown=0;
let sdDiff='easy';
let undoStack=[];
let bestTimes={easy:null,medium:null,hard:null};

// Load best times
try{
  var bs=JSON.parse(sessionStorage.getItem('addieSDKbest')||'{}');
  Object.assign(bestTimes,bs);
}catch(e){}

/* ── SUDOKU GENERATION ── */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function generateSolution(){
  sdSolution=Array(9).fill(null).map(()=>Array(9).fill(0));
  fillBox(0,0);fillBox(3,3);fillBox(6,6);
  solveBoard(sdSolution);
}

function fillBox(r,c){
  const nums=shuffle([1,2,3,4,5,6,7,8,9]);
  let i=0;
  for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) sdSolution[r+dr][c+dc]=nums[i++];
}

function isValid(bd,r,c,n){
  for(let i=0;i<9;i++) if(bd[r][i]===n||bd[i][c]===n) return false;
  const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
  for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) if(bd[br+dr][bc+dc]===n) return false;
  return true;
}

function solveBoard(bd){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(bd[r][c]!==0) continue;
    for(let n=1;n<=9;n++){
      if(isValid(bd,r,c,n)){
        bd[r][c]=n;
        if(solveBoard(bd)) return true;
        bd[r][c]=0;
      }
    }
    return false;
  }
  return true;
}

function createPlayableBoard(givens){
  sdBoard=sdSolution.map(row=>[...row]);
  sdGiven=Array(9).fill(null).map(()=>Array(9).fill(false));
  sdNotes=Array(9).fill(null).map(()=>Array(9).fill(null).map(()=>new Set()));

  // Remove cells to create puzzle
  const cellsToRemove=81-givens;
  const positions=shuffle(Array.from({length:81},(_,i)=>i));
  let removed=0;
  for(const pos of positions){
    if(removed>=cellsToRemove) break;
    const r=Math.floor(pos/9),c=pos%9;
    if(sdBoard[r][c]===0) continue;
    sdBoard[r][c]=0;
    removed++;
  }
  // Mark givens
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    sdGiven[r][c]=sdBoard[r][c]!==0;
  }
}

/* ── RENDER ── */
function renderBoard(){
  const boardEl=document.getElementById('sudoku-board');
  boardEl.innerHTML='';
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.row=r;
      cell.dataset.col=c;
      setCellContent(cell,r,c);
      applyHighlights(cell,r,c);
      cell.addEventListener('click',()=>selectCell(r,c));
      boardEl.appendChild(cell);
    }
  }
}

function setCellContent(cell,r,c){
  // Clear classes
  cell.className='cell';
  cell.dataset.row=r;
  cell.dataset.col=c;
  cell.textContent='';

  const val=sdBoard[r][c];
  const solVal=sdSolution[r][c];

  if(sdGiven[r][c]){
    cell.classList.add('given');
    cell.textContent=val;
  } else if(val!==0){
    cell.textContent=val;
    cell.classList.add(val===solVal?'correct':'incorrect');
  } else {
    // Check for notes
    const notes=sdNotes[r][c];
    if(notes&&notes.size>0){
      const ng=document.createElement('div');
      ng.className='notes-grid';
      for(let n=1;n<=9;n++){
        const nd=document.createElement('div');
        nd.className='note-num';
        nd.textContent=notes.has(n)?n:'';
        ng.appendChild(nd);
      }
      cell.appendChild(ng);
    }
  }
}

function updateCell(r,c){
  const cells=document.querySelectorAll('.cell');
  const cell=Array.from(cells).find(cl=>
    parseInt(cl.dataset.row)===r&&parseInt(cl.dataset.col)===c
  );
  if(cell){
    setCellContent(cell,r,c);
    applyHighlights(cell,r,c);
  }
}

function applyHighlights(cell,r,c){
  if(selectedRow===-1) return;
  const sr=selectedRow,sc=selectedCol;
  const selVal=sdBoard[sr][sc];

  if(r===sr&&c===sc){
    cell.classList.add('selected');
  } else if(r===sr||c===sc||
    (Math.floor(r/3)===Math.floor(sr/3)&&Math.floor(c/3)===Math.floor(sc/3))){
    cell.classList.add('peer');
  }
  // Highlight same numbers
  if(selVal!==0&&sdBoard[r][c]===selVal&&!(r===sr&&c===sc)){
    cell.classList.add('same-num');
  }
}

function refreshHighlights(){
  const cells=document.querySelectorAll('.cell');
  cells.forEach(cell=>{
    cell.classList.remove('selected','peer','same-num');
    const r=parseInt(cell.dataset.row),c=parseInt(cell.dataset.col);
    applyHighlights(cell,r,c);
  });
}

/* ── SELECTION & INPUT ── */
function selectCell(r,c){
  if(sdGameOver) return;
  selectedRow=r;selectedCol=c;
  refreshHighlights();
  updateNumPadCounts();
}

function inputNumber(n){
  if(sdGameOver||selectedRow===-1) return;
  const r=selectedRow,c=selectedCol;
  if(sdGiven[r][c]) return;

  if(sdNotesMode&&n!==0){
    // Toggle note
    if(sdBoard[r][c]===0){
      const notes=sdNotes[r][c];
      if(notes.has(n)) notes.delete(n); else notes.add(n);
      updateCell(r,c);
    }
    return;
  }

  // Push to undo stack
  undoStack.push({r,c,val:sdBoard[r][c],notes:new Set(sdNotes[r][c])});
  if(undoStack.length>50) undoStack.shift();

  if(n===0){
    sdBoard[r][c]=0;
    sdNotes[r][c].clear();
    updateCell(r,c);
    refreshHighlights();
    updateNumPadCounts();
    return;
  }

  sdBoard[r][c]=n;
  sdNotes[r][c].clear();

  if(n!==sdSolution[r][c]){
    sdMistakes++;
    updateHearts();
    updateCell(r,c);
    refreshHighlights();
    playSound('wrong');
    if(sdMistakes>=3) endGame(false);
  } else {
    updateCell(r,c);
    refreshHighlights();
    playSound('right');
    updateNumPadCounts();
    checkWin();
  }
}

function undoLast(){
  if(!undoStack.length||sdGameOver) return;
  const last=undoStack.pop();
  sdBoard[last.r][last.c]=last.val;
  sdNotes[last.r][last.c]=new Set(last.notes);
  updateCell(last.r,last.c);
  refreshHighlights();
  updateNumPadCounts();
}

function useHint(){
  if(sdGameOver||sdHints<=0) return;
  if(selectedRow===-1){ showMsg('Select a cell first!',''); return; }
  const r=selectedRow,c=selectedCol;
  if(sdGiven[r][c]||sdBoard[r][c]===sdSolution[r][c]){ showMsg('This cell is already correct!',''); return; }
  sdHints--;
  document.getElementById('hintCount').textContent=sdHints;
  undoStack.push({r,c,val:sdBoard[r][c],notes:new Set(sdNotes[r][c])});
  sdBoard[r][c]=sdSolution[r][c];
  sdNotes[r][c].clear();
  sdGiven[r][c]=true; // treat as given so it can't be overwritten
  updateCell(r,c);
  refreshHighlights();
  updateNumPadCounts();
  playSound('hint');
  if(sdHints===0) document.getElementById('hintBtn').style.opacity='.4';
  checkWin();
}

/* ── NUM PAD COUNTS ── */
function updateNumPadCounts(){
  const counts=Array(10).fill(0);
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(sdBoard[r][c]>0) counts[sdBoard[r][c]]++;
  }
  document.querySelectorAll('.num-btn').forEach(btn=>{
    const n=parseInt(btn.dataset.n);
    btn.classList.toggle('remaining-0', counts[n]>=9);
  });
}

/* ── HEARTS ── */
function updateHearts(){
  const hearts=document.querySelectorAll('.heart');
  hearts.forEach((h,i)=>{ h.classList.toggle('lost', i>=(3-sdMistakes)); });
  document.getElementById('mistakePill').classList.toggle('warn',sdMistakes>0);
}

/* ── WIN/LOSE ── */
function checkWin(){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(sdBoard[r][c]!==sdSolution[r][c]) return;
  }
  endGame(true);
}

function endGame(win){
  sdGameOver=true;
  clearInterval(timerInt);
  clearInterval(disappearInt);

  const timeStr=formatTime(sdTimer);

  if(win){
    playSound('win');
    // Best time
    let isPB=false;
    if(!bestTimes[sdDiff]||sdTimer<bestTimes[sdDiff]){
      bestTimes[sdDiff]=sdTimer;isPB=true;
      try{sessionStorage.setItem('addieSDKbest',JSON.stringify(bestTimes));}catch(e){}
    }
    document.getElementById('ovEmoji').textContent='🎉';
    document.getElementById('ovTitle').textContent='Puzzle Complete!';
    document.getElementById('ovSub').textContent=
      sdDiff==='hard'?'Solved on Hard mode?! That\'s clinician-level pattern recognition right there.':
      sdDiff==='medium'?'Strong work. You navigate complex puzzles like a complex discharge plan — methodically.':
      'Clean solve! Ready for a harder difficulty?';
    document.getElementById('ovPB').style.display=isPB?'inline-flex':'none';
  } else {
    playSound('lose');
    document.getElementById('ovEmoji').textContent='💀';
    document.getElementById('ovTitle').textContent='RIP Prior-Authorization Denied';
    document.getElementById('ovSub').textContent=
      'Three mistakes. Claim denied. The payer sends their regards.\nBetter luck on the next submission.';
    document.getElementById('ovPB').style.display='none';
  }

  document.getElementById('ovTime').textContent=timeStr;
  document.getElementById('ovMistakes').textContent=sdMistakes+'/3';
  const best=bestTimes[sdDiff];
  document.getElementById('ovBest').textContent=best?formatTime(best):'—';
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
}

/* ── TIMER & DISAPPEAR ── */
function startTimer(){
  sdTimer=0;
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    sdTimer++;
    document.getElementById('timerVal').textContent=formatTime(sdTimer);
  },1000);
}

function formatTime(s){
  return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
}

function startDisappear(){
  clearInterval(disappearInt);
  disappearCountdown=DISAPPEAR_INTERVAL;
  const tickMs=100;
  const warnAt=5000;
  disappearInt=setInterval(()=>{
    if(sdGameOver){ clearInterval(disappearInt); return; }
    disappearCountdown-=tickMs;
    const pct=Math.max(0,(disappearCountdown/DISAPPEAR_INTERVAL)*100);
    document.getElementById('disappearFill').style.width=pct+'%';

    // Change fill color when running low
    const fill=document.getElementById('disappearFill');
    if(pct<20) fill.style.background='linear-gradient(90deg,#ef4444,#f97316)';
    else if(pct<50) fill.style.background='linear-gradient(90deg,#f59e0b,#ef4444)';
    else fill.style.background='linear-gradient(90deg,var(--green),#f59e0b)';

    // Warning 5 seconds before
    if(disappearCountdown<=warnAt&&disappearCountdown>warnAt-tickMs){
      document.getElementById('warnBar').style.display='flex';
      // Flash cells that are given
      document.querySelectorAll('.cell.given').forEach(cl=>{
        cl.classList.add('warn-flash');
        setTimeout(()=>cl.classList.remove('warn-flash'),1500);
      });
    }

    if(disappearCountdown<=0){
      document.getElementById('warnBar').style.display='none';
      makeDisappear();
      disappearCountdown=DISAPPEAR_INTERVAL;
    }
  },tickMs);
}

function makeDisappear(){
  // Only disappear GIVEN cells (pre-filled) — don't erase player's correct work
  const givenCells=[];
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(sdGiven[r][c]&&sdBoard[r][c]!==0) givenCells.push({r,c});
  }
  if(!givenCells.length) return;
  const pick=givenCells[Math.floor(Math.random()*givenCells.length)];
  const cellEl=getCellEl(pick.r,pick.c);
  if(cellEl){
    cellEl.classList.add('disappearing');
    setTimeout(()=>{
      sdBoard[pick.r][pick.c]=0;
      sdGiven[pick.r][pick.c]=false;
      updateCell(pick.r,pick.c);
      refreshHighlights();
    },600);
  }
  playSound('disappear');
}

function getCellEl(r,c){
  return document.querySelector('.cell[data-row="'+r+'"][data-col="'+c+'"]');
}

/* ── GAME FLOW ── */
function startNewGame(){
  clearInterval(timerInt);
  clearInterval(disappearInt);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('warnBar').style.display='none';

  sdGameOver=false;sdMistakes=0;sdHints=3;
  sdNotesMode=false;sdNotesBtn&&sdNotesBtn.classList.remove('notes-on');
  selectedRow=-1;selectedCol=-1;
  undoStack=[];

  document.getElementById('hintCount').textContent=3;
  document.getElementById('hintBtn').style.opacity='1';
  document.getElementById('gameMsg').textContent='';
  document.getElementById('gameMsg').className='game-msg';
  document.getElementById('timerVal').textContent='0:00';

  // Reset hearts
  document.querySelectorAll('.heart').forEach(h=>h.classList.remove('lost'));
  document.getElementById('mistakePill').classList.remove('warn');

  generateSolution();
  createPlayableBoard(DIFF_GIVENS[sdDiff]);
  renderBoard();
  updateNumPadCounts();
  startTimer();
  startDisappear();
}

function showMsg(text,type){
  const el=document.getElementById('gameMsg');
  el.textContent=text;
  el.className='game-msg '+(type||'');
}

/* ── SOUND ── */
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='right'){
      osc.frequency.setValueAtTime(660,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.15,ctx.currentTime+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    } else if(type==='wrong'){
      osc.type='square';
      osc.frequency.setValueAtTime(200,ctx.currentTime);
      gain.gain.setValueAtTime(0.12,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.25);
    } else if(type==='disappear'){
      osc.type='sine';
      osc.frequency.setValueAtTime(440,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(220,ctx.currentTime+0.5);
      gain.gain.setValueAtTime(0.08,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
    } else if(type==='hint'){
      osc.frequency.setValueAtTime(528,ctx.currentTime);
      gain.gain.setValueAtTime(0,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12,ctx.currentTime+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    } else if(type==='win'){
      // Ascending arpeggio
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.setValueAtTime(f,ctx.currentTime+i*0.12);
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.12);
        g.gain.linearRampToValueAtTime(0.15,ctx.currentTime+i*0.12+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.35);
        o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.35);
      });
    } else if(type==='lose'){
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(330,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.6);
      gain.gain.setValueAtTime(0.1,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.6);
    }
  }catch(e){}
}

/* ── EVENT LISTENERS ── */
var sdNotesBtn;
document.addEventListener('DOMContentLoaded',()=>{
  sdNotesBtn=document.getElementById('notesBtn');

  // Difficulty
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      if(sdGameOver||confirm('Start a new game on '+this.dataset.diff+' difficulty?')){
        document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        sdDiff=this.dataset.diff;
        startNewGame();
      }
    });
  });

  // Num pad
  document.querySelectorAll('.num-btn').forEach(btn=>{
    btn.addEventListener('click',()=>inputNumber(parseInt(btn.dataset.n)));
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(e.key>='1'&&e.key<='9') inputNumber(parseInt(e.key));
    else if(e.key==='0'||e.key==='Backspace'||e.key==='Delete') inputNumber(0);
    else if(e.key==='ArrowUp'&&selectedRow>0){selectCell(selectedRow-1,selectedCol);}
    else if(e.key==='ArrowDown'&&selectedRow<8){selectCell(selectedRow+1,selectedCol);}
    else if(e.key==='ArrowLeft'&&selectedCol>0){selectCell(selectedRow,selectedCol-1);}
    else if(e.key==='ArrowRight'&&selectedCol<8){selectCell(selectedRow,selectedCol+1);}
    else if(e.key==='n'||e.key==='N'){toggleNotes();}
    else if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undoLast();}
  });

  // Buttons
  document.getElementById('eraseBtn').addEventListener('click',()=>inputNumber(0));
  document.getElementById('notesBtn').addEventListener('click',toggleNotes);
  document.getElementById('hintBtn').addEventListener('click',useHint);
  document.getElementById('restartBtn').addEventListener('click',startNewGame);
  document.getElementById('undoBtn').addEventListener('click',undoLast);
  document.getElementById('newBtn').addEventListener('click',startNewGame);

  startNewGame();
});

function toggleNotes(){
  sdNotesMode=!sdNotesMode;
  document.getElementById('notesBtn').classList.toggle('notes-on',sdNotesMode);
  document.getElementById('notesBtn').textContent=sdNotesMode?'✏️ Notes ON':'✏️ Notes';
  if(sdNotesMode) document.getElementById('notesBtn').classList.add('notes-on');
}
</script>
